<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine Note — Stormie Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #0c0c0b;
      color: #e8e4dc;
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }
    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 48px 100px;
    }
    .quote {
      max-width: 26ch;
      font-size: clamp(22px, 3.5vw, 36px);
      font-weight: 300;
      font-style: italic;
      line-height: 1.72;
      letter-spacing: 0.01em;
      color: #e8e4dc;
      opacity: 0;
      transform: translateY(40px);
      animation: reveal 2.4s cubic-bezier(.16,1,.3,1) forwards;
    }
    .author {
      margin-top: 28px;
      font-size: 10px;
      font-family: 'DM Sans', sans-serif;
      font-style: normal;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #c9a96e;
      opacity: 0;
      transform: translateY(20px);
      animation: reveal 2.2s cubic-bezier(.16,1,.3,1) 0.9s forwards;
    }
    .return {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 9px;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(232,228,220,0.22);
      text-decoration: none;
      opacity: 0;
      animation: fadeIn 2s ease 1.6s forwards;
      transition: color 0.25s ease;
      white-space: nowrap;
      cursor: pointer;
    }
    .return:hover { color: rgba(232,228,220,0.5); }
    @keyframes reveal {
      0%   { opacity: 0; transform: translateY(40px); }
      60%  { opacity: 0.7; }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div>
      <div class="quote">
        "Through time spent in the mountains, away from the crowds, away from the stopwatch and the grades and all the lists of records, I've been slowly able to pick apart what is important to me and discard things that are not."
      </div>
      <div class="author">Marc-André Leclerc</div>
    </div>
  </div>
  <a class="return" href="https://stormiestudios.com">← Return</a>
</body>
</html>
